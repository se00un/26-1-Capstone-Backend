version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: triplog_db
    restart: always
    environment:
      # .env 파일에 정의된 값을 가져와서 세팅합니다.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: triplog_web
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 컨테이너 간 통신을 위해 DB 접속 정보를 조합합니다.
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: